<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamOwl Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            padding: 60px 0;
        }
        
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .tagline {
            color: #888;
            font-size: 1.2rem;
        }
        
        .section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid #2a2a3e;
        }
        
        .section h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .links {
            display: grid;
            gap: 15px;
        }
        
        .link-card {
            background: #252540;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .link-card:hover {
            background: #303055;
            transform: translateX(5px);
        }
        
        .link-icon {
            font-size: 2rem;
        }
        
        .link-text h3 {
            color: #fff;
            margin-bottom: 5px;
        }
        
        .link-text p {
            color: #888;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .mascot-container {
            transition: transform 0.2s;
        }
        
        .mascot-container:hover {
            transform: scale(1.2);
        }
        
        .modal-overlay {
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦉 SamOwl Games</h1>
            <p class="tagline">Learn trading through play</p>
        </header>
        
        <div class="section">
            <h2>🎮 Games</h2>
            <div class="links">
                <a href="game.html" class="link-card">
                    <span class="link-icon">🏰</span>
                    <div class="link-text">
                        <h3>Bull vs Bear</h3>
                        <p>Tower Defense Game - Desktop only</p>
                    </div>
                </a>
                <a href="games/" class="link-card">
                    <span class="link-icon">🎲</span>
                    <div class="link-text">
                        <h3>All Games</h3>
                        <p>Color match, market match, trading quest & more</p>
                    </div>
                </a>
            </div>
        </div>
        
        <div class="section">
            <h2>📊 Trading</h2>
            <div class="links">
                <a href="leaderboard.html" class="link-card">
                    <span class="link-icon">🏆</span>
                    <div class="link-text">
                        <h3>Leaderboard</h3>
                        <p>Top performers and rankings</p>
                    </div>
                </a>
            </div>
        </div>
        
        <!-- Floating Mascot -->
        <div class="mascot-container" title="Click me!" onclick="showSamOwl('🦉 Hoot! Pick a game and start learning!')" style="position: fixed; bottom: 20px; right: 20px; font-size: 3em; cursor: pointer; z-index: 9999; animation: float 3s ease-in-out infinite;">🦉</div>
        
        <!-- SamOwl Message Modal -->
        <div class="modal-overlay" id="samowlModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center;">
            <div class="modal" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 2px solid #667eea; border-radius: 20px; padding: 30px; max-width: 400px; text-align: center; color: white; box-shadow: 0 20px 60px rgba(0,0,0,0.5);">
                <div style="font-size: 3em; margin-bottom: 10px;">🦉</div>
                <p id="samowlMessage" style="margin: 20px 0; font-size: 1.2em; line-height: 1.5;"></p>
                <button onclick="closeSamOwlModal()" style="margin-top: 20px; padding: 15px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; font-size: 1.1em; font-weight: bold; cursor: pointer;">Got it!</button>
            </div>
        </div>
        
        <script>
            function showSamOwl(message) {
                document.getElementById('samowlMessage').textContent = message;
                document.getElementById('samowlModal').style.display = 'flex';
            }
            function closeSamOwlModal() {
                document.getElementById('samowlModal').style.display = 'none';
            }
            document.getElementById('samowlModal').addEventListener('click', function(e) {
                if (e.target === document.getElementById('samowlModal')) closeSamOwlModal();
            });
        </script>
        
        <style>
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
        </style>
        
        <footer>
            <p>Made for fun and learning 📚</p>
            <p style="margin-top: 10px; font-size: 0.8rem;">Trade responsibly. Learn continuously.</p>
        </footer>
    </div>
</body>
</html>
