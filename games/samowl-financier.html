<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦉 Financier: Swap Meet Tycoon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: linear-gradient(90deg, #0f0f23 0%, #1a1a2e 100%);
            padding: 15px 20px;
            border-bottom: 3px solid #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.55rem; color: #ffd700; }

        .stats { display: flex; gap: 12px; flex-wrap: wrap; }
        .stat-box {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 10px 16px;
            text-align: center;
            min-width: 115px;
        }
        .stat-label { font-size: 0.75rem; color: #ddd; }
        .stat-value { font-size: 1.25rem; font-weight: bold; color: #ffd700; }

        .debt-warning {
            background: linear-gradient(90deg, #ff8800, #cc5500);
            padding: 12px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .debt-warning.active { display: block; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 340px;
            gap: 20px;
            padding: 20px;
            max-width: 1450px;
            margin: 0 auto;
        }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }

        .card {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(255, 215, 0, 0.25);
        }
        .card h2 {
            color: #ffd700;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.4);
            padding-bottom: 10px;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab {
            background: rgba(255, 215, 0, 0.12);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active, .tab:hover { background: #ffd700; color: #1a1a2e; }

        .biz-grid { display: grid; gap: 12px; }
        .biz-item {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #4CAF50;
        }
        .biz-item.locked { opacity: 0.6; border-left-color: #666; }

        .btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover:not(:disabled) { background: #ffed4e; }
        .btn.small { padding: 6px 12px; font-size: 0.9rem; }
        .btn.danger { background: #ff4444; color: white; }

        .news-ticker {
            background: rgba(0,0,0,0.45);
            border-radius: 10px;
            padding: 12px;
            max-height: 240px;
            overflow-y: auto;
        }
        .news-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .news-positive { color: #4CAF50; }
        .news-negative { color: #ff6666; }
    </style>
</head>
<body>

<div class="start-screen" id="startScreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;">
    <h1 style="color:#ffd700;font-size:2.8rem;">🦉 Financier: Swap Meet Tycoon</h1>
    <p style="max-width:500px;text-align:center;margin:20px 0;color:#ccc;">Work • Hustle • Build • Save • Grow</p>
    <input type="text" id="playerNameInput" placeholder="Your name" value="Alex Rivera" style="padding:15px;font-size:1.1rem;border:3px solid #ffd700;background:rgba(255,255,255,0.1);color:white;width:280px;border-radius:10px;margin-bottom:20px;">
    <button class="btn" onclick="startGame()" style="font-size:1.4rem;padding:16px 50px;background:#4CAF50;color:white;">START MY EMPIRE</button>
</div>

<div class="header">
    <h1>🦉 Financier: Swap Meet Tycoon</h1>
    <div class="stats">
        <div class="stat-box"><div class="stat-label">NET WORTH</div><div class="stat-value" id="netWorth">$0</div></div>
        <div class="stat-box"><div class="stat-label">CASH</div><div class="stat-value" id="cash">$0</div></div>
        <div class="stat-box"><div class="stat-label">SAVINGS</div><div class="stat-value" id="savings">$0</div></div>
        <div class="stat-box"><div class="stat-label">DAY</div><div class="stat-value" id="day">1</div></div>
    </div>
</div>

<div class="debt-warning" id="debtWarning">⚠️ You have debt — interest is accruing daily</div>

<div class="container">

    <!-- Left: My Businesses + Active Income -->
    <div class="card">
        <h2>💼 Active Income</h2>
        <div style="background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;margin-bottom:15px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>Job: <strong>$50/day</strong></div>
                <button class="btn small" id="quitJobBtn" onclick="quitJob()">Quit Job</button>
            </div>
            <div style="margin-top:10px;">
                <button class="btn" onclick="doSideHustle()" style="background:#2196F3;color:white;width:100%;">🚗 Do Side Hustle (Cost $25)</button>
            </div>
            <div style="margin-top:8px;">
                <button class="btn" onclick="dayTrade()" style="background:#9C27B0;color:white;width:100%;">📈 Day Trade Stocks (±$100)</button>
            </div>
        </div>

        <h2>🏪 My Businesses</h2>
        <div class="biz-grid" id="bizList"></div>
    </div>

    <!-- Center: Financial Hub -->
    <div class="card">
        <h2>💰 Financial Hub</h2>
        <div class="tabs">
            <button class="tab active" onclick="switchFinTab('businesses')">Buy Businesses</button>
            <button class="tab" onclick="switchFinTab('accounts')">Accounts & Loans</button>
            <button class="tab" onclick="switchFinTab('stocks')">Stocks</button>
        </div>

        <div id="bizTab">
            <div class="biz-grid" id="buyBizList"></div>
        </div>

        <div id="accountsTab" style="display:none;">
            <div id="accountsList" class="biz-grid"></div>
            <div style="margin-top:15px;display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn" onclick="transferToSavings()">Deposit to Savings</button>
                <button class="btn" onclick="withdrawFromSavings()">Withdraw Savings</button>
                <button class="btn" onclick="takeLoan()" style="background:#ff9800;">💳 Borrow $500 (10% interest)</button>
            </div>
        </div>

        <div id="stocksTab" style="display:none;">
            <div id="stocksList" class="biz-grid"></div>
        </div>
    </div>

    <!-- Right: News -->
    <div class="card" style="grid-row:span 2;">
        <h2>📰 News Feed</h2>
        <div class="news-ticker" id="newsTicker"></div>

        <h2 style="margin-top:25px;">⚙️ Controls</h2>
        <button class="btn" onclick="nextDay()" style="background:#2196F3;color:white;width:100%;margin-bottom:8px;">Advance 1 Day</button>
        <button class="btn danger" onclick="resetGame()" style="width:100%;">Reset Game</button>
    </div>
</div>

<script>
// ==================== GAME STATE ====================
let gameState = {
    playerName: '',
    cash: 600,
    savings: 300,
    debt: 0,
    day: 1,
    hasJob: true,
    businesses: {},
    stockPortfolio: {},
    lastDisasterDay: 0
};

const SAVINGS_DAILY_RATE = 0.0003; // ~11% APY

const businessTypes = [
    { id: 'foodtruck', name: '🍔 Food Truck', cost: 500, income: 50, expense: 25, unlock: 0 },
    { id: 'laundromat', name: '🧺 Laundromat', cost: 2000, income: 200, expense: 75, unlock: 1000 },
    { id: 'store', name: '🏪 Corner Store', cost: 5000, income: 500, expense: 175, unlock: 3000 },
    { id: 'factory', name: '🏭 Small Factory', cost: 15000, income: 1500, expense: 500, unlock: 10000 }
];

let stockPrices = { 'AAPL': 228, 'TSLA': 342, 'NVDA': 139, 'AMZN': 198 };

// ==================== CORE LOOP ====================
function startGame() {
    const name = document.getElementById('playerNameInput').value.trim() || 'Tycoon';
    gameState.playerName = name;
    document.getElementById('startScreen').classList.add('hidden');
    
    saveGame();
    updateAll();
    addNews(`Welcome, ${name}! You have a job paying $50/day.`, 'positive');

    setInterval(() => { gameState.day++; processDay(); }, 8000);
    setInterval(updateStockPrices, 22000);
}

function processDay() {
    let net = 0;

    // Job
    if (gameState.hasJob) net += 50;

    // Businesses
    for (const [id, data] of Object.entries(gameState.businesses)) {
        if (data.owned) {
            const biz = businessTypes.find(b => b.id === id);
            if (biz) net += (biz.income - biz.expense);
        }
    }

    gameState.cash += net;

    // Daily Savings Interest
    if (gameState.savings > 0) {
        const interest = Math.floor(gameState.savings * SAVINGS_DAILY_RATE);
        gameState.savings += interest;
        if (interest > 0) addNews(`🏦 Savings earned $${interest} interest`, 'positive');
    }

    // Debt Interest (10% per day on current debt - high but short-term)
    if (gameState.debt > 0) {
        const interest = Math.floor(gameState.debt * 0.10);
        gameState.debt += interest;
        addNews(`💳 Loan interest: $${interest} added`, 'negative');
    }

    // Rare Disaster
    if (gameState.day - gameState.lastDisasterDay > 30 && Math.random() < 0.022) {
        triggerDisaster();
        gameState.lastDisasterDay = gameState.day;
    }

    if (gameState.cash < -200) {
        gameState.debt += Math.abs(gameState.cash) + 100;
        gameState.cash = 30;
    }

    saveGame();
    updateAll();
}

function triggerDisaster() {
    const cost = [400, 800, 1200, 1600][Math.floor(Math.random()*4)];
    if (gameState.savings >= cost) {
        gameState.savings -= cost;
        addNews(`🏚️ Disaster! Paid $${cost} from savings`, 'negative');
    } else if (gameState.cash >= cost) {
        gameState.cash -= cost;
        addNews(`🏚️ Disaster! Paid $${cost} from cash`, 'negative');
    } else {
        const shortfall = cost - gameState.cash;
        gameState.cash = 0;
        gameState.debt += shortfall;
        addNews(`🏚️ Disaster! Took $${shortfall} in debt`, 'negative');
    }
}

// ==================== NEW FEATURES ====================
function quitJob() {
    if (!gameState.hasJob) return;
    if (confirm("Quit your job? You will stop earning $50/day.")) {
        gameState.hasJob = false;
        addNews("You quit your job. No more $50 daily paycheck.", 'neutral');
        updateAll();
    }
}

function doSideHustle() {
    if (gameState.cash < 25) {
        alert("You need $25 cash for gas/supplies to do the side hustle.");
        return;
    }
    gameState.cash -= 25;

    const earnings = Math.floor(Math.random() * 201) - 50; // -50 to +150
    gameState.cash += earnings;

    addNews(`🚗 Side Hustle: ${earnings >= 0 ? '+' : ''}$${earnings}`, earnings >= 0 ? 'positive' : 'negative');
    updateAll();
}

function dayTrade() {
    const risk = Math.floor(Math.random() * 201) - 100; // -100 to +100
    gameState.cash += risk;
    addNews(`📈 Day Trade result: ${risk >= 0 ? '+' : ''}$${risk}`, risk >= 0 ? 'positive' : 'negative');
    updateAll();
}

function takeLoan() {
    gameState.cash += 500;
    gameState.debt += 500;
    addNews(`💳 Took $500 loan. 10% daily interest applies!`, 'negative');
    updateAll();
}

function payLoan() {
    if (gameState.debt <= 0) return alert("No debt to pay.");
    const amount = parseInt(prompt(`Current debt: $${gameState.debt}\nHow much would you like to pay?`, "200"));
    if (amount > 0 && amount <= gameState.cash && amount <= gameState.debt) {
        gameState.cash -= amount;
        gameState.debt -= amount;
        addNews(`💳 Paid $${amount} toward loan`, 'positive');
        updateAll();
    }
}

// ==================== BUSINESS FUNCTIONS ====================
function buyBusiness(id) {
    const biz = businessTypes.find(b => b.id === id);
    if (!biz || gameState.businesses[id]?.owned) return;

    if (gameState.cash >= biz.cost) {
        gameState.cash -= biz.cost;
        gameState.businesses[id] = { owned: true };
        addNews(`🏪 Purchased ${biz.name} for $${biz.cost}`, 'positive');
        saveGame();
        updateAll();
    } else {
        alert(`Not enough cash. Need $${biz.cost}`);
    }
}

// ==================== SAVINGS & STOCKS ====================
function transferToSavings() {
    const amt = parseInt(prompt(`Cash: $${gameState.cash}\nHow much to save?`, "300"));
    if (amt > 0 && amt <= gameState.cash) {
        gameState.cash -= amt;
        gameState.savings += amt;
        addNews(`💰 Deposited $${amt} to savings`, 'positive');
        updateAll();
    }
}

function withdrawFromSavings() {
    const amt = parseInt(prompt(`Savings: $${gameState.savings}\nHow much to withdraw?`, "200"));
    if (amt > 0 && amt <= gameState.savings) {
        gameState.savings -= amt;
        gameState.cash += amt;
        addNews(`🏦 Withdrew $${amt} from savings`, 'neutral');
        updateAll();
    }
}

function updateStockPrices() {
    Object.keys(stockPrices).forEach(k => {
        stockPrices[k] = Math.max(50, Math.round(stockPrices[k] * (0.96 + Math.random() * 0.09)));
    });
    if (document.getElementById('stocksTab').style.display !== 'none') renderStocks();
}

function buyStock(sym) {
    const price = stockPrices[sym];
    const shares = parseInt(prompt(`$${sym} @ $${price}\nHow many shares?`));
    if (shares > 0 && shares * price <= gameState.cash) {
        gameState.cash -= shares * price;
        gameState.stockPortfolio[sym] = (gameState.stockPortfolio[sym] || 0) + shares;
        addNews(`📈 Bought ${shares} shares of ${sym}`, 'positive');
        updateAll();
    }
}

function sellStock(sym) {
    const owned = gameState.stockPortfolio[sym] || 0;
    if (owned === 0) return;
    const price = stockPrices[sym];
    const shares = parseInt(prompt(`Sell ${owned} shares of ${sym} @ $${price}\nHow many?`));
    if (shares > 0 && shares <= owned) {
        gameState.cash += shares * price;
        gameState.stockPortfolio[sym] -= shares;
        if (gameState.stockPortfolio[sym] <= 0) delete gameState.stockPortfolio[sym];
        addNews(`📉 Sold ${shares} shares of ${sym}`, 'positive');
        updateAll();
    }
}

// ==================== UI ====================
function switchFinTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    document.getElementById('bizTab').style.display = tab === 'businesses' ? 'block' : 'none';
    document.getElementById('accountsTab').style.display = tab === 'accounts' ? 'block' : 'none';
    document.getElementById('stocksTab').style.display = tab === 'stocks' ? 'block' : 'none';

    if (tab === 'accounts') renderAccounts();
    if (tab === 'stocks') renderStocks();
}

function updateAll() {
    let bizValue = 0;
    Object.keys(gameState.businesses).forEach(id => {
        if (gameState.businesses[id].owned) {
            const b = businessTypes.find(x => x.id === id);
            bizValue += b ? b.cost * 0.8 : 0;
        }
    });

    let stockValue = 0;
    Object.entries(gameState.stockPortfolio).forEach(([s, qty]) => stockValue += qty * (stockPrices[s]||0));

    const netWorth = Math.floor(gameState.cash + gameState.savings + bizValue + stockValue - gameState.debt);

    document.getElementById('netWorth').textContent = '$' + netWorth.toLocaleString();
    document.getElementById('cash').textContent = '$' + gameState.cash.toLocaleString();
    document.getElementById('savings').textContent = '$' + gameState.savings.toLocaleString();
    document.getElementById('day').textContent = gameState.day;

    document.getElementById('debtWarning').classList.toggle('active', gameState.debt > 0);
    document.getElementById('quitJobBtn').textContent = gameState.hasJob ? "Quit Job" : "No Job";
    document.getElementById('quitJobBtn').disabled = !gameState.hasJob;

    renderMyBusinesses();
    renderBuyBusinesses();
}

function renderMyBusinesses() {
    const container = document.getElementById('bizList');
    const owned = Object.keys(gameState.businesses).filter(id => gameState.businesses[id].owned);

    if (owned.length === 0) {
        container.innerHTML = `<div style="color:#aaa;padding:20px;text-align:center;">You don't own any businesses yet.</div>`;
        return;
    }

    container.innerHTML = owned.map(id => {
        const biz = businessTypes.find(b => b.id === id);
        const profit = biz.income - biz.expense;
        return `
            <div class="biz-item">
                <div>
                    <strong>${biz.name}</strong><br>
                    <small>Net: <span style="color:#4CAF50">+$${profit}/day</span></small>
                </div>
                <div style="text-align:right;font-size:0.9rem;">
                    +$${biz.income}<br>
                    -$${biz.expense}
                </div>
            </div>
        `;
    }).join('');
}

function renderBuyBusinesses() {
    const container = document.getElementById('buyBizList');
    container.innerHTML = businessTypes.map(biz => {
        const owned = !!gameState.businesses[biz.id]?.owned;
        const canBuy = gameState.cash >= biz.cost;
        return `
            <div class="biz-item ${owned ? '' : ''}">
                <div>
                    <strong>${biz.name}</strong><br>
                    Cost: $${biz.cost}<br>
                    Net: <span style="color:#4CAF50">+$${biz.income - biz.expense}/day</span>
                </div>
                <button class="btn small" onclick="buyBusiness('${biz.id}')" ${owned || !canBuy ? 'disabled' : ''}>
                    ${owned ? 'Owned' : 'Buy'}
                </button>
            </div>
        `;
    }).join('');
}

function renderAccounts() {
    const container = document.getElementById('accountsList');
    const dailyInterest = Math.floor(gameState.savings * SAVINGS_DAILY_RATE);
    
    container.innerHTML = `
        <div class="biz-item"><div>Cash</div><div>$${gameState.cash.toLocaleString()}</div></div>
        <div class="biz-item">
            <div>Savings<br><small>Daily interest: $${dailyInterest}</small></div>
            <div>$${gameState.savings.toLocaleString()}</div>
        </div>
        <div class="biz-item">
            <div>Debt (10% daily)</div>
            <div style="color:#ff6666">-$${gameState.debt.toLocaleString()}</div>
        </div>
        ${gameState.debt > 0 ? `<button class="btn small" onclick="payLoan()" style="width:100%;margin-top:10px;">Make Loan Payment</button>` : ''}
    `;
}

function renderStocks() {
    const container = document.getElementById('stocksList');
    container.innerHTML = Object.keys(stockPrices).map(sym => {
        const owned = gameState.stockPortfolio[sym] || 0;
        return `
            <div class="biz-item">
                <div>${sym} @ $${stockPrices[sym]}<br>${owned} shares</div>
                <div>
                    <button class="btn small" onclick="buyStock('${sym}')">Buy</button>
                    <button class="btn small" onclick="sellStock('${sym}')" ${owned===0?'disabled':''}>Sell</button>
                </div>
            </div>
        `;
    }).join('');
}

function addNews(text, type = 'neutral') {
    const ticker = document.getElementById('newsTicker');
    const div = document.createElement('div');
    div.className = `news-item news-${type}`;
    div.innerHTML = `<strong>Day ${gameState.day}:</strong> ${text}`;
    ticker.prepend(div);
    if (ticker.children.length > 14) ticker.removeChild(ticker.lastChild);
}

function nextDay() { gameState.day++; processDay(); }

function saveGame() { localStorage.setItem('tycoonGameV4', JSON.stringify(gameState)); }
function loadGame() {
    const saved = localStorage.getItem('tycoonGameV4');
    if (saved) gameState = { ...gameState, ...JSON.parse(saved) };
}

function resetGame() {
    if (confirm("Reset the entire game?")) {
        localStorage.removeItem('tycoonGameV4');
        location.reload();
    }
}

// Init
loadGame();
if (gameState.playerName) {
    document.getElementById('startScreen').classList.add('hidden');
    updateAll();
}
</script>
</body>
</html>
