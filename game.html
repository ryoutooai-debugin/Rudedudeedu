<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamOwl Games - Bull vs Bear TD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .owl { font-size: 4em; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .warning {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
        }
        .warning h2 {
            color: #ffc107;
            margin-bottom: 10px;
        }
        .btn {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.3em;
            font-weight: bold;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .desktop-only {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .desktop-only h3 { color: #dc3545; margin-bottom: 10px; }
        .back-link {
            display: block;
            margin-top: 40px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="owl">🦉</div>
        <h1>Bull vs Bear TD</h1>
        
        <div class="warning">
            <h2>⚠️ Desktop Only</h2>
            <p>This enhanced tower defense game requires a keyboard and mouse.</p>
            <p>Please play on a desktop or laptop computer.</p>
        </div>
        
        <a href="games/td-chunked/bundled.html" class="btn">🎮 Play Now (Desktop)</a>
        
        <div class="desktop-only">
            <h3>🖱️ Controls</h3>
            <p><strong>Left-click:</strong> Place towers<br>
            <strong>Right-click:</strong> Sell towers<br>
            <strong>Keyboard:</strong> Hotkeys for towers</p>
        </div>
        
        <a href="index.html" class="back-link">← Back to Game Menu</a>
    </div>
</body>
</html>
