<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamOwl Games - Tower Defense</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 700px;
        }
        .hero-graphic {
            font-size: 6em;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 30px rgba(102, 126, 234, 0.4));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        .warning {
            background: rgba(255, 193, 7, 0.15);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 15px 25px;
            margin: 30px auto;
            max-width: 400px;
        }
        .warning p {
            color: #ffc107;
            font-size: 0.95rem;
            margin: 0;
        }
        .btn {
            display: inline-block;
            padding: 25px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6);
        }
        .controls {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px 30px;
            margin-top: 30px;
            display: inline-block;
        }
        .controls h3 { color: #667eea; margin-bottom: 10px; }
        .controls p { color: #aaa; margin: 5px 0; }
        .back-link {
            display: block;
            margin-top: 40px;
            color: #667eea;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-graphic">🏰🛡️🐂🐻</div>
        <h1>Tower Defense</h1>
        <p class="subtitle">Build your defenses. Protect your portfolio.</p>
        
        <div class="warning">
            <p>⚠️ Desktop Only — Keyboard & Mouse Required</p>
        </div>
        
        <a href="games/td-chunked/bundled.html" class="btn">🎮 Enter Game</a>
        
        <div class="controls">
            <h3>🖱️ Controls</h3>
            <p>Left-click: Place towers</p>
            <p>Right-click: Sell towers</p>
            <p>Keyboard: Hotkeys</p>
        </div>
        
        <a href="index.html" class="back-link">← Back to Game Menu</a>
    </div>
</body>
</html>
